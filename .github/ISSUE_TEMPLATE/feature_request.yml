name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please note that submissions do not guarantee implementation.
        For more detailed proposals, you can also reach out at [mateo@callec.net](mailto:mateo@callec.net).

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve, or what workflow would it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references that might be useful.
    validations:
      required: false
