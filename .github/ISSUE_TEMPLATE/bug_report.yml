name: Bug Report
description: Report something that is broken or not working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, please make sure you are on the latest version of Arcane Scout.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can the issue be reproduced?
      placeholder: |
        1. Open DevTools on ...
        2. Navigate to ...
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: chrome-version
    attributes:
      label: Chrome version
      placeholder: "e.g. 125.0.6422.112"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, macOS 14, Ubuntu 24.04"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console errors
      description: Paste any relevant screenshots or DevTools console output here.
    validations:
      required: false
